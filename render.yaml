services:
  - type: web
    name: flexora-api
    env: node
    region: ohio
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SITE_URL
        value: https://flexora.onrender.com

  - type: web
    name: flexora
    env: static
    region: ohio
    buildCommand: npm run build:css
    staticPublishPath: ./
    envVars:
      - key: API_BASE
        value: https://flexora-api.onrender.com
    headers:
      - path: /assets/fonts/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /tailwind.css
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /style.css
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
